name: ACLClouds Auto Renew

on:
  repository_dispatch:
    types: [googlecloud-trigger]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  renew-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install gost
        run: |
          set -euo pipefail
          GOST_VER="2.12.0"
          URL="https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost_${GOST_VER}_linux_amd64.tar.gz"

          echo "Downloading gost from: $URL"
          curl -fL "$URL" -o gost.tar.gz

          ls -lh gost.tar.gz
          tar -xzf gost.tar.gz
          chmod +x gost
          sudo mv gost /usr/local/bin/gost

          which gost
          gost -V

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Run Renew Script
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: python renew.py

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Debug-Screenshots
          path: "*.png"
          retention-days: 5
